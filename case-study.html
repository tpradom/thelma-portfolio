    function initSliders() {
      document.querySelectorAll('.cs-ba-slider').forEach(slider => {
        const beforeWrap = slider.querySelector('.cs-ba-before-wrap');
        const beforeImg  = slider.querySelector('.cs-ba-img-before');
        const handle     = slider.querySelector('.cs-ba-handle');
        let dragging = false;

        function syncImgWidth() {
          if (beforeImg) beforeImg.style.width = slider.offsetWidth + 'px';
        }
        syncImgWidth();
        new ResizeObserver(syncImgWidth).observe(slider);

        function move(clientX) {
          const r = slider.getBoundingClientRect();
          const pct = Math.min(Math.max((clientX - r.left) / r.width, 0.02), 0.98);
          beforeWrap.style.width = (pct * 100) + '%';
          handle.style.left      = (pct * 100) + '%';
        }

        slider.addEventListener('mousedown',  e => { dragging = true; move(e.clientX); e.preventDefault(); });
        window.addEventListener('mousemove',  e => { if (dragging) move(e.clientX); });
        window.addEventListener('mouseup',    () => { dragging = false; });
        slider.addEventListener('touchstart', e => { dragging = true; move(e.touches[0].clientX); }, { passive: true });
        window.addEventListener('touchmove',  e => { if (dragging) move(e.touches[0].clientX); }, { passive: true });
        window.addEventListener('touchend',   () => { dragging = false; });
      });
    }
