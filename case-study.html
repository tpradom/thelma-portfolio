    function initSliders() {
      document.querySelectorAll('.cs-ba-slider').forEach(slider => {
        const beforeWrap = slider.querySelector('.cs-ba-before-wrap');
        const beforeImg  = slider.querySelector('.cs-ba-img-before');
        const handle     = slider.querySelector('.cs-ba-handle');
        let dragging = false;

        function syncImgWidth() {
          if (beforeImg) beforeImg.style.width = slider.offsetWidth + 'px';
        }
        syncImgWidth();
        new ResizeObserver(syncImgWidth).observe(slider);

        function move(clientX) {
          const r = slider.getBoundingClientRect();
          const pct = Math.min(Math.max((clientX - r.left) / r.width, 0.02), 0.98);
          beforeWrap.style.width = (pct * 100) + '%';
          handle.style.left      = (pct * 100) + '%';
        }

        slider.addEventListener('mousedown',  e => { dragging = true; move(e.clientX); e.preventDefault(); });
        window.addEventListener('mousemove',  e => { if (dragging) move(e.clientX); });
        window.addEventListener('mouseup',    () => { dragging = false; });
        slider.addEventListener('touchstart', e => { dragging = true; move(e.touches[0].clientX); }, { passive: true });
        window.addEventListener('touchmove',  e => { if (dragging) move(e.touches[0].clientX); }, { passive: true });
        window.addEventListener('touchend',   () => { dragging = false; });
      });
    }

    function initAccordion() {
      const items  = document.querySelectorAll('.cs-acc-item');
      const panels = document.querySelectorAll('.cs-acc-panel');

      // set initial open height
      const firstBody = document.querySelector('.cs-acc-item.active .cs-acc-body');
      if (firstBody) firstBody.style.maxHeight = firstBody.scrollHeight + 'px';

      items.forEach(item => {
        item.querySelector('.cs-acc-trigger').addEventListener('click', () => {
          const idx = item.dataset.index;
          const isAlreadyOpen = item.classList.contains('active');

          items.forEach(el => {
            el.classList.remove('active');
            el.querySelector('.cs-acc-icon').textContent = '+';
            el.querySelector('.cs-acc-body').style.maxHeight = '0';
          });
          panels.forEach(el => el.classList.remove('active'));

          if (!isAlreadyOpen) {
            item.classList.add('active');
            item.querySelector('.cs-acc-icon').textContent = '−';
            const body = item.querySelector('.cs-acc-body');
            body.style.maxHeight = body.scrollHeight + 'px';
            const panel = document.querySelector(`.cs-acc-panel[data-index="${idx}"]`);
            if (panel) { panel.classList.add('active'); if (idx === '3') initOutcomeChart(); }
          }
        });
      });
    }

    function initCarousels() {
      document.querySelectorAll('.cs-carousel').forEach(carousel => {
        const slides = carousel.querySelectorAll('.cs-carousel-slide');
        const dots   = carousel.querySelectorAll('.cs-carousel-dot');
        const prev   = carousel.querySelector('.cs-carousel-prev');
        const next   = carousel.querySelector('.cs-carousel-next');
        let current  = 0;

        function goTo(idx) {
          slides[current].removeAttribute('data-active');
          dots[current] && dots[current].classList.remove('active');
          current = (idx + slides.length) % slides.length;
          slides[current].setAttribute('data-active', 'true');
          dots[current] && dots[current].classList.add('active');
        }

        prev && prev.addEventListener('click', () => goTo(current - 1));
        next && next.addEventListener('click', () => goTo(current + 1));
        dots.forEach((dot, i) => dot.addEventListener('click', () => goTo(i)));
      });
    }

            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M13 8H3M7 4L3 8l4 4"/>
            </svg>
            All work
          </a>
          <p class="cs-subtitle reveal">${cs.title}</p>
          <h2 class="cs-heading reveal reveal-delay-1">${cs.subtitle}</h2>
          <div class="cs-meta-grid reveal reveal-delay-2">${metaItems}</div>
        </div>

        <div class="cs-cover">
          <div class="cs-cover-img reveal" style="background:${cs.coverGradient}">
            ${cs.cover
              ? `<img src="${cs.cover}" alt="${cs.title}">`
              : cs.video
                ? `<video src="${cs.video}" autoplay muted loop playsinline></video>`
                : ''}
          </div>
        </div>

        <div class="cs-body-wrap">${sectionRows}</div>

        <p class="cs-disclaimer">Due to confidentiality agreements, certain details have been modified or omitted.</p>

        <div class="cs-nav">
          ${prevLink}
          ${nextLink}
        </div>
      `;

      // trigger reveal + sliders + carousels after render
      requestAnimationFrame(() => {
        document.querySelectorAll('.reveal').forEach(el => revealObserver.observe(el));
        initSliders();
        initCarousels();
        initLightbox();
      });
    }

    function initLightbox() {
      document.querySelectorAll('.cs-image-stack img').forEach(img => {
        img.style.cursor = 'zoom-in';
        img.addEventListener('click', () => {
          const overlay = document.createElement('div');
          overlay.id = 'lightbox';
          overlay.innerHTML = `<img src="${img.src}" alt="${img.alt}"><div class="lb-hint">Scroll to zoom · Drag to pan</div>`;
          document.body.appendChild(overlay);
          requestAnimationFrame(() => overlay.classList.add('active'));

          const lbImg = overlay.querySelector('img');
          let scale = 1, tx = 0, ty = 0;
          let dragging = false, startX, startY, lastTx, lastTy;

          function applyTransform() {
            lbImg.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
            lbImg.style.cursor = scale > 1 ? 'grab' : 'default';
          }

          overlay.addEventListener('wheel', e => {
            e.preventDefault();
            const delta = e.deltaY > 0 ? -0.15 : 0.15;
            scale = Math.min(Math.max(1, scale + delta), 5);
            if (scale === 1) { tx = 0; ty = 0; }
            applyTransform();
          }, { passive: false });

          lbImg.addEventListener('mousedown', e => {
            if (scale <= 1) return;
            dragging = true; startX = e.clientX - tx; startY = e.clientY - ty;
            lbImg.style.cursor = 'grabbing';
            e.stopPropagation();
          });
          window.addEventListener('mousemove', e => {
            if (!dragging) return;
            tx = e.clientX - startX; ty = e.clientY - startY;
            applyTransform();
          });
          window.addEventListener('mouseup', () => {
            if (dragging) { dragging = false; lbImg.style.cursor = scale > 1 ? 'grab' : 'default'; }
          });

          const close = () => {
            overlay.classList.remove('active');
            overlay.addEventListener('transitionend', () => overlay.remove(), { once: true });
          };
          overlay.addEventListener('click', e => { if (!dragging && e.target === overlay) close(); });
          document.addEventListener('keydown', function esc(e) {
            if (e.key === 'Escape') { close(); document.removeEventListener('keydown', esc); }
          });
        });
      });
    }

    const id = window.location.hash.slice(1);
    renderCaseStudy(id);
    window.addEventListener('hashchange', () => {
      renderCaseStudy(window.location.hash.slice(1));
      window.scrollTo(0, 0);
    });
  </script>
</body>
